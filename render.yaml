# Render Blueprint
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: dcm-api
    env: docker  # 使用 Docker 构建
    dockerfilePath: ./Dockerfile
    region: oregon
    plan: free
    healthCheckPath: /internal/v1/health
    envVars:
      - key: DCM_MVP_MODE
        value: "true"
      - key: USE_BLOCKCHAIN
        value: "false"
      - key: DCM_DATABASE_URL
        value: sqlite:///./dcm.db
      - key: PYTHON_VERSION
        value: "3.11"
