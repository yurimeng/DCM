# DCM - Docker Compose Configuration
# For local development and testing

version: '3.8'

services:
  # DCM API Server
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DCM_DATABASE_URL=sqlite:///./dcm.db
      - DCM_API_HOST=0.0.0.0
      - DCM_API_PORT=8000
      - DCM_MVP_MODE=true
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Development server with hot reload
  api-dev:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DCM_DATABASE_URL=sqlite:///./dcm_dev.db
      - DCM_API_HOST=0.0.0.0
      - DCM_API_PORT=8000
      - DCM_MVP_MODE=true
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

networks:
  default:
    name: dcm-network
