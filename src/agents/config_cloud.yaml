# Node Agent 配置 - 连接云端
router:
  host: "dcm-api-p00a.onrender.com"
  port: 443
  use_https: true
  use_websocket: false  # HTTP polling
  poll_interval: 3      # seconds
  reconnect_interval: 10
  max_retries: 3

ollama:
  host: "localhost"
  port: 11434
  model: "qwen2.5:7b"  # 使用本地可用模型
  timeout: 60

agent:
  node_id: "68ac422a-e828-4c53-982f-973b45307204"
  heartbeat_interval: 30
  max_concurrent_jobs: 1

logging:
  level: "INFO"
  file: "node_agent_cloud.log"
