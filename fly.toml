# DCM API - Fly.io Configuration
# Generated for MVP testing

app = "dcm-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  DCM_DATABASE_URL = "sqlite:///./data/dcm.db"
  DCM_MVP_MODE = "true"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[mounts]]
  source = "dcm_data"
  destination = "/app/data"

[checks]
  [checks.health]
    port = 8080
    type = "http"
    path = "/health"
    interval = "10s"
    timeout = "5s"
