# Cloud Run Deployment Configuration
# GCP Cloud Run - Serverless Container Platform

# ============================================
# 快速部署命令
# ============================================
# 
# 1. 设置项目
#    gcloud config set project YOUR_PROJECT_ID
#
# 2. 运行部署脚本
#    ./scripts/deploy-cloudrun.sh
#
# 3. 或手动部署
#    gcloud builds submit --tag gcr.io/$PROJECT_ID/dcm-api
#    gcloud run deploy dcm-api --image gcr.io/$PROJECT_ID/dcm-api
#
# ============================================

# Cloud Build 配置
steps:
  # 构建 Docker 镜像
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/dcm-api:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/dcm-api:latest'
      - '.'

  # 推送到 Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/dcm-api:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/dcm-api:latest'

  # 部署到 Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'dcm-api'
      - '--image'
      - 'gcr.io/$PROJECT_ID/dcm-api:latest'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--port'
      - '8000'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--concurrency'
      - '80'
      - '--timeout'
      - '60s'
      - '--set-env-vars'
      - 'DCM_MVP_MODE=true,DCM_DATABASE_URL=sqlite:///./dcm.db'

# 镜像
images:
  - 'gcr.io/$PROJECT_ID/dcm-api:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/dcm-api:latest'

# 超时
timeout: '600s'

# 选项
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
