# Cloudflare Workers Configuration (Alternative)
# For serverless deployment

name = "dcm-api"
main = "src/workers/handler.py"
compatibility_date = "2024-01-01"

[site]
bucket = "./dist"

# Environment variables
[vars]
MVP_MODE = "true"
DATABASE_URL = "sqlite:///./dcm.db"

# Bindings
[[d1_databases]]
binding = "DB"
database_name = "dcm-db"
database_id = "your-database-id"

[[kv_namespaces]]
binding = "CACHE"
id = "your-kv-id"
